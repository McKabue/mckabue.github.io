<article style="overflow-x:hidden;" class="page">
    <div class="row">

        <div id="mainArea" data-bind="with: resume">
            <section>
                <article>
                    <div class="sectionTitle2">
                        <h1>PERSONAL SUMMARY</h1>
                    </div>

                    <div class="sectionContent2">
                        <p data-bind="html: personalsummary"></p>
                    </div>
                </article>
                <div class="clear"></div>
            </section>


            <section>
                <div class="sectionTitle2">
                    <h1>SKILLS & ABILITIES</h1>
                </div>

                <div class="sectionContent2">
                    <article>
                        <ul class="skilllist fa fa-ul" style="font-size: 1.2em;">
                            <!-- ko foreach: skillsabilities -->
                            <li><i class="fa-li fa fa-check-circle-o"></i> <span data-bind="html: value"></span></li>
                            <!-- /ko -->
                        </ul>
                    </article>
                </div>
                <div class="clear"></div>
            </section>


            <section>
                <div class="sectionTitle2">
                    <h1>EDUCATION</h1>
                </div>

                <div class="sectionContent2">

                    <!-- ko foreach: education -->
                    <p class="subDetails" data-bind="html: school"></p>
                    <p data-bind="html: details"></p>
                    <!-- /ko -->

                </div>
                <div class="clear"></div>
            </section>


            <section>
                <div class="sectionTitle2">
                    <h1>REFERENCES</h1>
                </div>

                <div class="sectionContent2">
                    <article>
                        <p data-bind="html: references"></p>
                    </article>
                </div>
                <div class="clear"></div>
                <hr>
            </section>

        </div>

























    </div>

</article>
